<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Painel do Vendedor</title>
<link rel="stylesheet" href="css/estilo.css">

<!-- Firebase SDK -->

<body>

<div class="vendedor-form">
  <h3>Adicionar Produto</h3>

  <input type="file" id="imagemFile" accept="image/*">
>
  <select id="categoria">
    <option value="camisas">Camisa</option>
    <option value="calças">Calça</option>
    <option value="sapatos">Sapato</option>
      <option value="sapatos">Gola polo</option>
  </select>
  <input type="text" id="whatsapp" placeholder="WhatsApp do vendedor (ex: 5511999999999)">
  <button onclick="adicionarProduto()">Adicionar Produto</button>
</div>

<div class="produtos" id="produtos-admin">
  <!-- Produtos carregados aqui -->
</div>

<script src="js/main.js"></script>

inicializarFirebase();
verificarLogin(); // Bloqueia acesso se não estiver logado
